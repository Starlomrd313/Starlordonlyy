<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 SERPENT - Demo</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 100%);color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px}.container{max-width:450px;text-align:center}.logo{font-size:3em;margin-bottom:10px}.wallet{background:rgba(0,255,136,.2);border:2px solid #00ff88;border-radius:20px;padding:25px;font-size:28px;font-weight:700;box-shadow:0 0 40px rgba(0,255,136,.4);margin:20px 0}.bet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.bet-chip{padding:15px;border:2px solid #666;border-radius:12px;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.05);font-weight:700}.bet-chip:hover{background:rgba(0,255,136,.2);border-color:#00ff88;transform:scale(1.05)}.bet-chip.active{background:linear-gradient(45deg,#00ff88,#00d4ff);border-color:#00ff88;box-shadow:0 0 25px rgba(0,255,136,.6);color:#000}.btn{background:linear-gradient(45deg,#ff6b35,#f7931e);border:none;padding:18px 35px;border-radius:30px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin:10px;transition:all .3s;box-shadow:0 10px 30px rgba(255,107,53,.4)}.btn:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(255,107,53,.6)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}.status{margin:20px 0;padding:20px;border-radius:15px;font-weight:700;display:none}.success{background:rgba(0,255,0,.2);border:2px solid #00ff00;color:#00ff00}.error{background:rgba(255,0,0,.2);border:2px solid #ff0000;color:#ff0000}.demo-badge{position:fixed;top:20px;right:20px;background:#ff6b35;color:#fff;padding:10px 15px;border-radius:25px;font-size:12px;font-weight:700;z-index:1000;box-shadow:0 5px 15px rgba(255,107,53,.4)}canvas{border:3px solid #00ff88;border-radius:20px;background:#000;display:none;max-width:90vw;max-height:50vh}
  </style>
</head>
<body>
  <div class="demo-badge">🔥 LIVE DEMO</div>
  
  <div class="container">
    <div class="logo">🐍 SERPENT</div>
    <h2>Real Money Snake</h2>
    
    <!-- WALLET -->
    <div class="wallet">
      💰 <span id="wallet">0.00</span> Coins
    </div>
    
    <!-- BET -->
    <div style="background:rgba(0,212,255,.15);border:2px solid #00d4ff;border-radius:20px;padding:25px;">
      <h3 style="margin-bottom:15px;color:#00d4ff">🎰 Place Bet (0.10x per point)</h3>
      <div class="bet-grid" id="betChips"></div>
      <div style="margin:20px 0;font-size:18px">
        Reward: <strong id="rewardRate">--</strong> coins/pt
      </div>
      <button class="btn" id="playBtn" onclick="startGame()" disabled>🚀 PLAY GAME</button>
    </div>
    
    <!-- BUY COINS -->
    <div>
      <button class="btn" onclick="buyCoins(10,50)">₹10 = 50 Coins</button>
      <button class="btn" onclick="buyCoins(50,250)">₹50 = 250 Coins</button>
      <button class="btn" onclick="buyCoins(99,500)">₹99 = 500 Coins 🔥</button>
    </div>
    
    <!-- STATUS -->
    <div id="status" class="status"></div>
    
    <!-- GAME -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>

  <script>
    let wallet=0,currentBet=0,gameActive=false;
    const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
    
    // Update UI
    function updateWallet(){document.getElementById('wallet').textContent=wallet.toFixed(2)}
    
    // Bet chips
    function initBets(){
      const chips=[5,10,20,50,100];
      document.getElementById('betChips').innerHTML=chips.map(a=>`<div class="bet-chip" onclick="selectBet(${a})">${a}<br><small>${(a*0.1).toFixed(1)}x/pt</small></div>`).join('');
    }
    
    function selectBet(amount){
      currentBet=amount;
      document.querySelectorAll('.bet-chip').forEach(c=>c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('rewardRate').textContent=(amount*0.1).toFixed(2);
      document.getElementById('playBtn').disabled=false;
    }
    
    // 🔥 REAL RAZORPAY PAYMENT
    async function buyCoins(rupees,coins){
      try{
        showStatus('⏳ Creating order...','loading');
        
        // Create order
        const orderRes=await fetch('https://your-backend.vercel.app/api/create-order',{ // YOUR BACKEND URL
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({amount:rupees,coins:coins,buyer_email:'demo@serpent.com'})
        });
        const orderData=await orderRes.json();
        
        showStatus('✅ Opening payment...','success');
        
        // Razorpay
        const rzp=new Razorpay({
          key:'rzp_test_7zX9gK8jK7zX9g', // YOUR TEST KEY
          amount:orderData.amount,
          currency:orderData.currency,
          name:'🐍 SERPENT DEMO',
          description:`${coins} Coins`,
          order_id:orderData.order_id,
          handler:async(response)=>{
            showStatus('🔍 Verifying...','loading');
            // Verify (demo - real backend call)
            wallet+=coins;
            updateWallet();
            showStatus(`✅ +${coins} Coins Added! 🎉`,'success');
          },
          theme:{color:'#00ff88'}
        });
        rzp.open();
      }catch(e){
        showStatus('❌ '+e.message,'error');
      }
    }
    
    function showStatus(msg,type){
      const el=document.getElementById('status');
      el.textContent=msg;
      el.className=`status ${type}`;
      el.style.display='block';
      if(type!=='loading')setTimeout(()=>el.style.display='none',4e3);
    }
    
    function startGame(){
      if(!currentBet)return showStatus('❌ Select bet!','error');
      if(wallet<currentBet)return showStatus('❌ Low balance!','error');
      wallet-=currentBet;updateWallet();showStatus(`🚀 Bet $${currentBet} placed!`,'success');
      canvas.style.display='block';gameActive=true;
      // Simple game animation
      let x=10,y=10;function gameLoop(){if(!gameActive)return;ctx.clearRect(0,0,400,400);ctx.fillStyle='#00ff88';ctx.fillRect(x*20,y*20,18,18);x+=.2;requestAnimationFrame(gameLoop)}gameLoop();
    }
    
    // Init
    window.onload=()=>{
      updateWallet();
      initBets();
      console.log('🐍 Serpent Demo Ready!');
    };
  </script>
</body>
</html>

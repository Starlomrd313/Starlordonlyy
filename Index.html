<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sumera ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 500px;
  padding: 20px;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-weight: 500;
  font-size: 28px;
  min-height: 80px;
}

button {
  margin: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: black;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text"></h1>
  <button onclick="next()" id="btn">Continue</button>
</div>

<audio id="music" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=emotional-piano-ambient-110997.mp3">
</audio>

<script>
const messages = [
  "Hey Sumera...",
  "I know you're upset...",
  "And honestly... I deserve that 😔",
  "But I never wanted to hurt you",
  "You really matter to me ❤️",
  "Can I fix this?"
];

let index = 0;

function typeEffect(text, element, speed = 50) {
  let i = 0;
  element.innerHTML = "";
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

function next() {
  index++;

  if(index < messages.length){
    typeEffect(messages[index], document.getElementById("text"));
  }

  if(index === messages.length - 1){
    document.getElementById("btn").style.display = "none";

    setTimeout(() => {
      const yes = document.createElement("button");
      yes.innerText = "Okay 🙂";
      yes.onclick = () => {
        document.getElementById("text").innerHTML = "Thank you Sumera ❤️<br>I promise I'll make things right.";
      };

      const no = document.createElement("button");
      no.innerText = "Still Angry 😒";
      no.onclick = () => {
        alert("I'll keep trying until you smile 😊");
      };

      document.querySelector(".container").appendChild(yes);
      document.querySelector(".container").appendChild(no);
    }, 800);
  }
}

typeEffect(messages[0], document.getElementById("text"));
</script>

</body>
</html>

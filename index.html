<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sumera ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-family: Arial;
  transition: 0.8s;
  background-size: cover;
  background-position: center;
}

.container {
  text-align: center;
}

h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

/* heart */
.heart {
  font-size: 80px;
  animation: beat 1s infinite;
}
@keyframes beat {
  0% {transform: scale(1);}
  50% {transform: scale(1.3);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text">HEY SUMERAHHH</h1>
  <button onclick="next()">Continue</button>
</div>

<audio id="sound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>
const texts = [
  "HEY SUMERAHHH",
  "CHAL YAAR AB MAAN BHI JA 🙂",
  "Okay fine… meri galti 🤝",
  "Last chance 😄"
];

const bg = [
  "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
  "https://images.unsplash.com/photo-1492724441997-5dc865305da7",
  "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
  "https://images.unsplash.com/photo-1519125323398-675f0ddb6308"
];

let i = 0;

document.body.style.backgroundImage = "url(" + bg[0] + ")";

function next(){
  const sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  i++;

  if(i < texts.length){
    document.getElementById("text").innerText = texts[i];
    document.body.style.backgroundImage = "url(" + bg[i] + ")";
  }

  if(i === texts.length){
    document.getElementById("text").innerHTML =
      "<div class='heart'>❤️</div><br>Hope this made you smile 🙂";
  }
}
</script>

</body>
</html>

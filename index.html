<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sumera ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: black;
  color: white;
  transition: 1s;
}

/* animated gradient bg */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #ff416c, #ff4b2b, #1e90ff, #00c9ff);
  animation: bgMove 8s linear infinite;
  z-index: -1;
}

@keyframes bgMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-50%,-50%); }
  100% { transform: translate(0,0); }
}

.container {
  text-align: center;
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
}

h1 {
  font-size: 45px;
  margin-bottom: 30px;
  animation: fade 1s;
}

button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  font-size: 18px;
  cursor: pointer;
  background: white;
  color: black;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* heart */
.heart {
  font-size: 90px;
  animation: beat 1s infinite;
}
@keyframes beat {
  0% {transform: scale(1);}
  50% {transform: scale(1.4);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text">HEY SUMERAHHH</h1>
  <button onclick="next()">Continue</button>
</div>

<audio id="sound">
  <source src="https://cdn.pixabay.com/download/audio/2023/03/27/audio_5c8c1cbd7c.mp3">
</audio>

<script>
const texts = [
  "HEY SUMERAHHH",
  "CHAL YAAR AB MAAN BHI JA 🙂",
  "Okay fine… meri galti 🤝",
  "Last chance 😄"
];

let i = 0;

function next(){
  const sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  i++;

  const textEl = document.getElementById("text");

  if(i < texts.length){
    textEl.innerText = texts[i];
    textEl.style.animation = "none";
    setTimeout(()=> textEl.style.animation = "fade 1s", 10);
  }

  if(i === texts.length){
    textEl.innerHTML = "<div class='heart'>❤️</div><br>Hope this made you smile 🙂";
  }
}
</script>

</body>
</html>
